{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>نتایج جستجو - نساجیت</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <button class="back-button" onclick="history.back()">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="header-logo"><span class="logo-text">نتایج جستجو</span></div>
    </header>

    <main class="main-content">
      <div class="section-header" style="margin-top: 15px; padding: 0 10px;">
        <h3 style="font-size: 14px; color: #555;">نتایج برای: <strong style="color: var(--primary);">"{{ query }}"</strong></h3>
      </div>
      
      <section class="category-grid" style="margin-top: 15px;">
        {% for product in products %}
        <div class="category-card" onclick="location.href='{% url 'product_detail' product.slug %}'" style="cursor: pointer;">
          <div class="category-info">
            <div class="category-label">{{ product.name }}</div>
            <div class="category-desc">{{ product.category.title }}</div>
            <div style="font-size: 11px; font-weight: bold; color: var(--primary); margin-top: 8px;">مشاهده محصول</div>
          </div>
          {% if product.main_image %}
            <div class="category-image" style="background-image: url('{{ product.main_image.url }}'); width: 120px;"></div>
          {% else %}
            <div class="category-image" style="background-color: #eee; width: 120px;"></div>
          {% endif %}
        </div>
        {% empty %}
        <p style="text-align: center; color: #999; margin-top: 50px;">پارچه‌ای با این نام یافت نشد.</p>
        {% endfor %}
      </section>
    </main>
  </div>
</body>
</html>
