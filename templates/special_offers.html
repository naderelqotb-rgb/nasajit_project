{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>پیشنهادهای ویژه نساجیت</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <button class="back-button" onclick="history.back()">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="header-logo"><span class="logo-text">پیشنهادهای ویژه</span></div>
    </header>

    <main class="main-content">
      <section class="category-grid" style="margin-top: 15px;">
        {% for product in products %}
        <div class="category-card" onclick="location.href='{% url 'product_detail' product.slug %}'" style="cursor: pointer;">
          <div class="category-info">
            <div class="category-label">{{ product.name }}</div>
            <div class="category-desc">{{ product.category.title }}</div>
            <div style="font-size: 12px; font-weight: bold; color: #ef4444; margin-top: 5px;">تخفیف: {{ product.discount }}</div>
          </div>
          {% if product.main_image %}
            <div class="category-image" style="background-image: url('{{ product.main_image.url }}'); width: 120px;"></div>
          {% else %}
            <div class="category-image" style="background-color: #eee; width: 120px;"></div>
          {% endif %}
        </div>
        {% empty %}
        <p style="text-align: center; color: #999; margin-top: 50px;">در حال حاضر پیشنهاد ویژه‌ای موجود نیست.</p>
        {% endfor %}
      </section>
    </main>

    <nav class="bottom-nav">
    <button class="nav-item" onclick="location.href='{% url 'special_offers' %}'">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        <span>پیشنهاد ویژه</span>
    </button>
    <button class="nav-item" onclick="toggleSearch(true)">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <span>جستجو</span>
    </button>
    <button class="nav-item active" onclick="location.href='{% url 'home' %}'">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22" stroke="white" stroke-width="2"/></svg>
        <span>خانه</span>
    </button>
    </nav>
  </div>
</body>
</html>
